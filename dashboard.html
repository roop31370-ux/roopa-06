<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        body { display: block; background: #f8f9fa; } /* Overriding center for dashboard */
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">User Portal</a>
            <div class="ms-auto">
                <a href="index.html" class="btn btn-outline-light btn-sm">Logout</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="bg-white p-5 rounded shadow-sm">
            <h1>Welcome Back, User!</h1>
            <p class="lead">This is your professional dashboard styled with Bootstrap 5.</p>
            <hr>
            <div class="row">
                <div class="col-md-4 mb-3">
                    <div class="card bg-primary text-white p-3">
                        <h5>Profile</h5>
                        <p>Manage your account settings.</p>
                    </div>
                </div>
                <div class="col-md-4 mb-3">
                    <div class="card bg-success text-white p-3">
                        <h5>Activity</h5>
                        <p>View your recent login history.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
