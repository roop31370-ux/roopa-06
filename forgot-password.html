<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card p-4 text-center">
                    <h3 class="mb-3">Forgot Password?</h3>
                    <p class="text-muted mb-4">Enter your email to reset your password.</p>
                    <form action="reset-password.html">
                        <input type="email" class="form-control mb-3" placeholder="Enter your email">
                        <button type="submit" class="btn btn-primary w-100">Send Reset Link</button>
                    </form>
                    <a href="index.html" class="mt-3 d-block text-decoration-none">Back to Login</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
